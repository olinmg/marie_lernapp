services:
  backend:
    build: ./backend
    ports:
      - "8001:8001"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=sqlite+aiosqlite:////data/flashlearn.db
    volumes:
      - db-data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3001:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend
    restart: unless-stopped

  db-admin:
    image: python:3.12-slim
    command: >
      bash -c "pip install sqlite-web && sqlite_web /data/flashlearn.db --host 0.0.0.0 --port 8080"
    ports:
      - "8080:8080"
    volumes:
      - db-data:/data
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
